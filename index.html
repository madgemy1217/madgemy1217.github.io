<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATH STORE — техника Apple</title>
  <meta name="description" content="Магазин техники Apple. iPhone, iPad, Mac, Watch, AirPods." />
  <link rel="icon" type="image/jpeg" href="./assets/logo-ath.jpg" />
  <style>
    :root{--background:#fff;--foreground:#202124;--card:#fff;--primary:#3b8b33;--primary-foreground:#fff;--secondary:#f4f4f5;--muted:#f4f4f5;--muted-foreground:#71717a;--border:#e4e4e7;--destructive:#dc2626;--radius:10px;--shadow:0 14px 35px -22px rgba(59,139,51,.55)}
    *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:var(--background);color:var(--foreground);font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;-webkit-font-smoothing:antialiased}a{color:inherit;text-decoration:none}button,input,select,textarea{font:inherit}button{cursor:pointer}.container{width:min(1160px,calc(100% - 32px));margin:0 auto}.site{min-height:100vh;display:flex;flex-direction:column}.header{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.84);backdrop-filter:blur(14px);border-bottom:1px solid var(--border)}.header-inner{height:64px;display:flex;align-items:center;justify-content:space-between;gap:16px}.brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px;letter-spacing:0;color:var(--primary)}.brand img{width:36px;height:36px;border-radius:8px;object-fit:cover}.nav{display:flex;align-items:center;gap:10px}.link{border:0;background:transparent;padding:9px 10px;border-radius:8px;color:var(--foreground)}.link:hover{background:var(--secondary)}.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:1px solid var(--border);background:var(--background);color:var(--foreground);border-radius:8px;padding:9px 13px;font-weight:600}.btn:hover{background:var(--secondary)}.btn.primary{border-color:var(--primary);background:var(--primary);color:var(--primary-foreground)}.btn.danger{color:var(--destructive)}.btn.icon{width:38px;height:38px;padding:0}.cart-btn{position:relative}.hero{border-bottom:1px solid var(--border);background:linear-gradient(135deg,rgba(59,139,51,.13),rgba(255,255,255,0) 68%)}.hero-inner{padding:48px 0 54px}.hero h1{font-size:clamp(34px,5vw,56px);line-height:1.02;margin:0;font-weight:850;letter-spacing:0}.hero p{margin:12px 0 0;color:var(--muted-foreground);font-size:19px}.main{flex:1;padding:32px 0}.footer{border-top:1px solid var(--border);margin-top:44px;color:var(--muted-foreground)}.footer-inner{padding:28px 0;display:flex;align-items:center;justify-content:space-between;gap:16px;font-size:14px}.toolbar{display:flex;flex-direction:column;gap:16px;margin-bottom:24px}.search{width:min(440px,100%);padding:11px 14px;border:1px solid var(--border);background:var(--background);border-radius:8px}.chips{display:flex;flex-wrap:wrap;gap:8px}.chip{border:1px solid var(--border);background:var(--background);border-radius:999px;padding:8px 12px;font-size:14px}.chip.active{background:var(--primary);border-color:var(--primary);color:var(--primary-foreground)}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:20px}.card{border:1px solid var(--border);background:var(--card);border-radius:12px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 1px 0 rgba(0,0,0,.02);transition:box-shadow .2s,transform .2s}.card:hover{box-shadow:var(--shadow);transform:translateY(-2px)}.thumb{aspect-ratio:1/1;background:var(--secondary);display:block;overflow:hidden}.thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .25s}.card:hover .thumb img{transform:scale(1.04)}.card-body{padding:16px;display:flex;flex-direction:column;gap:9px;flex:1}.card h3{margin:0;font-size:16px;line-height:1.25}.muted{color:var(--muted-foreground)}.small{font-size:14px}.price-row{display:flex;align-items:baseline;gap:8px;margin-top:auto}.price{font-size:19px;font-weight:800}.old{text-decoration:line-through;color:var(--muted-foreground);font-size:14px}.page-title{font-size:32px;line-height:1.1;margin:0 0 24px;font-weight:800}.product{display:grid;grid-template-columns:minmax(0,1fr) minmax(320px,1fr);gap:34px}.gallery{display:grid;gap:12px}.gallery-item{aspect-ratio:1/1;background:var(--secondary);border-radius:12px;overflow:hidden}.gallery-item img{width:100%;height:100%;object-fit:cover}.product h1{font-size:34px;margin:0 0 10px;line-height:1.1}.product-price{font-size:32px;font-weight:850;margin:26px 0}.option-group{margin-top:22px}.option-label{font-size:14px;font-weight:700;margin:0 0 9px}.options{display:flex;flex-wrap:wrap;gap:8px}.option{border:1px solid var(--border);background:var(--background);border-radius:8px;padding:10px 12px;font-size:14px}.option.active{border-color:var(--primary);background:rgba(59,139,51,.1)}.swatch{width:38px;height:38px;border-radius:999px;border:2px solid var(--border)}.swatch.active{border-color:var(--primary)}.description{margin-top:28px;line-height:1.7}.specs{border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-top:12px}.spec{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border);font-size:14px}.spec:last-child{border-bottom:0}.spec dt,.spec dd{margin:0;padding:11px 14px}.cart-grid{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:24px}.cart-list{display:grid;gap:12px}.cart-item{display:flex;gap:16px;border:1px solid var(--border);border-radius:10px;padding:15px;background:var(--card)}.cart-item img{width:82px;height:82px;object-fit:cover;border-radius:8px;background:var(--secondary)}.cart-info{flex:1;min-width:0}.cart-info h3{margin:0 0 6px;font-size:16px}.qty{display:flex;align-items:center;gap:8px;margin-top:10px}.qty button{width:30px;height:30px;border-radius:6px;border:1px solid var(--border);background:var(--background)}.summary{border:1px solid var(--border);border-radius:10px;padding:20px;height:max-content;background:var(--card)}.summary-line{display:flex;justify-content:space-between;gap:16px;font-size:19px}.form{max-width:690px;display:grid;gap:16px}.field{display:grid;gap:6px}.field span{font-size:14px;font-weight:700}.input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--background);color:var(--foreground)}textarea.input{min-height:88px;resize:vertical}.form-bottom{display:flex;align-items:center;justify-content:space-between;gap:16px;border-top:1px solid var(--border);padding-top:18px}.login-card{max-width:380px;margin:0 auto}.admin-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:16px}.notice{border:1px solid var(--border);background:rgba(244,244,245,.7);color:var(--muted-foreground);border-radius:8px;padding:12px;font-size:14px;margin-bottom:16px}.tabs{display:flex;gap:8px;border-bottom:1px solid var(--border);margin-bottom:22px}.tab{border:0;border-bottom:2px solid transparent;background:transparent;padding:12px 14px;font-weight:700}.tab.active{border-color:var(--primary);color:var(--primary)}.admin-list{border:1px solid var(--border);border-radius:10px;overflow:hidden}.admin-row{display:flex;align-items:center;gap:12px;padding:12px;border-bottom:1px solid var(--border)}.admin-row:last-child{border-bottom:0}.admin-row img{width:52px;height:52px;border-radius:8px;object-fit:cover;background:var(--secondary)}.admin-row-main{flex:1;min-width:0}.admin-row-main strong,.admin-row-main span{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.editor{display:grid;gap:22px;max-width:920px}.editor-section{display:grid;gap:12px}.editor-section h3{border-bottom:1px solid var(--border);padding-bottom:8px;margin:0}.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}.checks{display:flex;gap:18px;flex-wrap:wrap}.rows{display:grid;gap:9px}.edit-row{display:flex;align-items:center;gap:8px}.sticky-actions{position:sticky;bottom:0;background:var(--background);border-top:1px solid var(--border);padding:12px 0;display:flex;gap:8px}.modal-back{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;display:flex;align-items:center;justify-content:center;padding:16px}.modal{width:min(460px,100%);background:var(--background);border-radius:12px;padding:18px;box-shadow:0 24px 70px rgba(0,0,0,.24);display:grid;gap:12px}.modal-head{display:flex;align-items:center;justify-content:space-between}.modal-head h3{margin:0}.empty{color:var(--muted-foreground);padding:18px 0}.toast-wrap{position:fixed;right:16px;bottom:16px;z-index:80;display:grid;gap:8px}.toast{background:#202124;color:#fff;border-radius:8px;padding:11px 13px;box-shadow:0 10px 30px rgba(0,0,0,.2);font-size:14px}.hide{display:none!important}.category-layout{display:grid;grid-template-columns:280px minmax(0,1fr);gap:24px}.filter-panel{position:sticky;top:82px;align-self:start;border:1px solid var(--border);border-radius:12px;background:var(--card);padding:16px;display:grid;gap:18px}.filter-head{display:flex;align-items:center;justify-content:space-between;gap:12px}.filter-head h2{margin:0;font-size:18px}.filter-group{display:grid;gap:9px}.filter-title{font-size:14px;font-weight:800}.filter-row{display:flex;gap:8px}.filter-check{display:flex;align-items:center;gap:8px;font-size:14px}.filter-chip{border:1px solid var(--border);background:var(--background);border-radius:8px;padding:7px 10px;font-size:13px;text-align:left}.filter-chip.active{border-color:var(--primary);background:rgba(59,139,51,.1);color:var(--primary)}.filter-swatch{width:34px;height:34px;border-radius:999px;border:2px solid var(--border);box-shadow:inset 0 0 0 1px rgba(255,255,255,.5)}.filter-swatch.active{border-color:var(--primary);box-shadow:0 0 0 3px rgba(59,139,51,.16)}.category-top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px}.category-count{color:var(--muted-foreground);font-size:14px}@media (max-width:920px){.grid{grid-template-columns:repeat(3,minmax(0,1fr))}.product,.cart-grid,.category-layout{grid-template-columns:1fr}.summary{max-width:420px}.nav .catalog-link{display:none}.filter-panel{position:static}}@media (max-width:680px){.container{width:min(100% - 24px,1160px)}.header-inner{height:auto;min-height:62px}.brand span{font-size:16px}.grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.card-body{padding:12px}.hero-inner{padding:34px 0}.footer-inner,.form-bottom{align-items:flex-start;flex-direction:column}.two{grid-template-columns:1fr}.cart-item{align-items:flex-start}.cart-item img{width:70px;height:70px}.admin-row{align-items:flex-start}.edit-row{align-items:flex-start;flex-direction:column}.edit-row .input{width:100%}.btn{padding:8px 10px}.header .btn span.optional{display:none}}@media (max-width:430px){.grid{grid-template-columns:1fr}.header-inner{gap:8px}.brand img{width:32px;height:32px}.nav{gap:4px}.cart-btn{padding-inline:9px}}
  </style>
  <style>
    .filter-toggle{display:none}
    .filter-backdrop{display:none}
    @media (max-width:920px){
      .filter-toggle{display:inline-flex;align-items:center;gap:8px;margin-bottom:14px}
      .category-layout{grid-template-columns:1fr}
      .filter-panel{position:fixed;top:0;left:0;bottom:0;width:min(360px,86%);max-width:360px;z-index:60;background:var(--background);border:0;border-right:1px solid var(--border);border-radius:0;padding:18px;overflow-y:auto;transform:translateX(-100%);transition:transform .25s ease;box-shadow:0 18px 60px rgba(0,0,0,.2)}
      .filter-panel.open{transform:translateX(0)}
      .filter-backdrop.open{display:block;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:55}
      .filter-apply{position:sticky;bottom:-18px;margin:18px -18px -18px;padding:14px 18px;background:var(--background);border-top:1px solid var(--border)}
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="toasts" class="toast-wrap"></div>
  <script>
  (() => {
    const STORAGE_CATALOG = "ath_catalog_override";
    const STORAGE_CART = "ath-store-cart";
    const STORAGE_ADMIN = "ath_admin_auth";
    const ADMIN_LOGIN = "root";
    const ADMIN_PASSWORD = "1234";
    const TELEGRAM_USERNAME = "isma_shake";
    const SHOP_PHONE = "+7 (977) 552-92-20";
    const SHOP_PHONE_TEL = "+79775529220";
    const SHOP_ADDRESS = "ТЦ «Горбушкин двор», г. Москва, Багратионовский проезд, 7к1";
    let catalogCache = null;
    let state = { cart: readJson(STORAGE_CART, []), activeCat: "all", query: "", sort:"popular", onlyStock:false, onlySale:false, priceMin:"", priceMax:"", colors:[], specs:{}, filtersOpen:false, variantIdx: 0, colorIdx: 0, adminTab: "products", editingProduct: null, editingCategory: null, checkout: { name:"", phone:"", delivery:"pickup", payment:"cash", address:"", notes:"" }, login:"", password:"" };
    const app = document.getElementById("app");

    function readJson(key, fallback){ try { const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : fallback; } catch { return fallback; } }
    function saveJson(key, value){ localStorage.setItem(key, JSON.stringify(value)); }
    function isAdmin(){ return localStorage.getItem(STORAGE_ADMIN) === "1"; }
    function money(value){ return new Intl.NumberFormat("ru-RU", { style:"currency", currency:"RUB", maximumFractionDigits:0 }).format(Number(value || 0)); }
    function esc(value){ return String(value ?? "").replace(/[&<>"']/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch])); }
    function toast(message){ const box = document.getElementById("toasts"); const item = document.createElement("div"); item.className = "toast"; item.textContent = message; box.appendChild(item); setTimeout(() => item.remove(), 2600); }
    function isSpecActive(key,value){ return (state.specs[key] || []).includes(value); }
    function filterValues(products, key){ return [...new Set(products.flatMap(p => (p.specs || []).filter(s => s.key === key).map(s => s.value)).filter(Boolean))].sort((a,b)=>String(a).localeCompare(String(b),'ru')); }
    function categoryFilters(slug, products){
      const prices = products.map(p => Number(p.price || 0)).filter(Boolean);
      const colorMap = new Map(); products.forEach(p => (p.colors || []).forEach(c => { if (!colorMap.has(c.name)) colorMap.set(c.name, c); }));
      const specKeys = [...new Set(products.flatMap(p => (p.specs || []).map(s => s.key)).filter(Boolean))].sort((a,b)=>String(a).localeCompare(String(b),'ru'));
      const preferred = slug === 'iphone' ? ['Модель','Процессор','Год релиза','Память','Тип разъема для зарядки','Тип разблокировки','Экран','Камера','Поддержка MagSafe','Беспроводная зарядка'] : slug === 'watch' ? ['Модель','Размер корпуса','Постоянная работа экрана','Объем встроенной памяти','Класс','Материал корпуса','Цвет корпуса','Ремешок','Экран','Чип'] : [];
      const keys = [...preferred.filter(k => specKeys.includes(k)), ...specKeys.filter(k => !preferred.includes(k))];
      return { min: prices.length ? Math.min(...prices) : 0, max: prices.length ? Math.max(...prices) : 0, colors: [...colorMap.values()], keys };
    }
    function route(){ const h = location.hash || "#/"; const clean = h.replace(/^#/, "") || "/"; return clean.startsWith("/") ? clean : "/" + clean; }
    function go(path){ location.hash = "#" + path; }
    function uid(){ return (crypto && crypto.randomUUID) ? crypto.randomUUID() : "id-" + Date.now() + "-" + Math.random().toString(16).slice(2); }
    function assetPath(path){ return path || ""; }

    async function loadCatalog(force=false){
      if (catalogCache && !force) return catalogCache;
      const local = readJson(STORAGE_CATALOG, null);
      if (local) {
        const hasRichData = (local.products || []).some(p => (p.specs && p.specs.length) || (p.colors && p.colors.length));
        if (hasRichData) { catalogCache = local; return catalogCache; }
        localStorage.removeItem(STORAGE_CATALOG);
      }
      const res = await fetch("./products.json", { cache:"no-cache" });
      if (!res.ok) throw new Error("Не удалось загрузить products.json");
      catalogCache = await res.json();
      return catalogCache;
    }
    function saveCatalog(catalog){ catalogCache = catalog; saveJson(STORAGE_CATALOG, catalog); render(); }
    async function resetCatalog(){ localStorage.removeItem(STORAGE_CATALOG); catalogCache = null; await loadCatalog(true); render(); }
    function downloadCatalogJson(catalog){ const blob = new Blob([JSON.stringify(catalog, null, 2)], {type:"application/json"}); const url = URL.createObjectURL(blob); const a = document.createElement("a"); a.href = url; a.download = "products.json"; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url); }

    function addCart(item){ const existing = state.cart.find(i => i.id === item.id); if (existing) existing.qty += 1; else state.cart.push({...item, qty:1}); saveJson(STORAGE_CART, state.cart); toast("Добавлено в корзину"); renderHeaderOnly(); }
    function setQty(id, qty){ if (qty <= 0) state.cart = state.cart.filter(i => i.id !== id); else state.cart = state.cart.map(i => i.id === id ? {...i, qty} : i); saveJson(STORAGE_CART, state.cart); render(); }
    function removeCart(id){ state.cart = state.cart.filter(i => i.id !== id); saveJson(STORAGE_CART, state.cart); render(); }
    function clearCart(){ state.cart = []; saveJson(STORAGE_CART, state.cart); }
    function cartTotal(){ return state.cart.reduce((s,i)=>s+i.price*i.qty,0); }
    function cartCount(){ return state.cart.reduce((s,i)=>s+i.qty,0); }

    function header(){ return `<header class="header"><div class="container header-inner"><a class="brand" href="#/"><img src="./assets/logo-ath.jpg" alt="ATH STORE"><span><span style="color:var(--primary)">ATH</span> <span style="color:var(--foreground)">STORE</span></span></a><nav class="nav"><a class="link catalog-link" href="#/">Каталог</a><a class="link catalog-link" href="#/contacts">Контакты</a>${isAdmin()?`<a class="btn" href="#/admin">🛡 <span class="optional">Админ</span></a><button class="btn icon" data-action="logout" title="Выйти">↩</button>`:""}<a class="btn primary cart-btn" href="#/cart">🛒 <span>${cartCount()}</span></a></nav></div></header>`; }
    function footer(){ return `<footer class="footer"><div class="container footer-inner"><p>© ${new Date().getFullYear()} ATH STORE. Все права защищены.</p><p>Оригинальная техника Apple</p></div></footer>`; }
    function shell(content, hero=""){ return `<div class="site">${header()}${hero}<main class="container main">${content}</main>${footer()}</div>`; }

    async function pageHome(){
      const c = await loadCatalog();
      const q = state.query.trim().toLowerCase();
      const categories = [...c.categories].sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));
      const allSorted = [...c.products].sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));
      const hero = `<section class="hero"><div class="container hero-inner"><p style="margin:0 0 10px;color:var(--primary);font-weight:700;letter-spacing:.08em;text-transform:uppercase;font-size:13px">ATH Store</p><h1>Магазин техники и гаджетов</h1><p>Apple, Samsung, Xiaomi, Dyson, игровые приставки и аксессуары — оригинал, гарантия, доставка по России.</p><div class="chips" style="margin-top:18px">${categories.slice(0,8).map(cat=>`<a class="chip" href="#/category/${esc(cat.slug)}">${esc(cat.name)}</a>`).join("")}</div></div></section>`;
      const searchBar = `<div class="toolbar"><input id="search" class="search" type="search" placeholder="Поиск по каталогу…" value="${esc(state.query)}"></div>`;
      if (q){
        const found = allSorted.filter(p => `${p.name} ${p.tagline||""} ${p.description||""} ${p.aliases||""}`.toLowerCase().includes(q));
        return shell(`${searchBar}${found.length?`<div class="grid">${found.map(productCard).join("")}</div>`:`<p class="empty">Ничего не найдено.</p>`}`, hero);
      }
      const sections = categories.map(cat => {
        const inCat = allSorted.filter(p => p.category_id === cat.id);
        const featured = inCat.filter(p => p.featured);
        const rest = inCat.filter(p => !p.featured);
        const items = [...featured, ...rest].slice(0, 4);
        if (!items.length) return "";
        return `<section style="margin-bottom:44px"><div style="display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:16px"><h2 style="margin:0;font-size:26px;font-weight:800">${esc(cat.name)}</h2><a class="link" href="#/category/${esc(cat.slug)}" style="color:var(--primary);font-weight:600;font-size:14px">Смотреть все →</a></div><div class="grid">${items.map(productCard).join("")}</div></section>`;
      }).join("");
      return shell(`${searchBar}${sections || `<p class="empty">Каталог пока пуст. Добавьте товары в админке.</p>`}`, hero);
    }

    function productCard(p){ return `<article class="card"><a class="thumb" href="#/product/${esc(p.slug)}">${p.image?`<img src="${esc(assetPath(p.image))}" alt="${esc(p.name)}" loading="lazy">`:""}</a><div class="card-body"><h3>${esc(p.name)}</h3>${p.tagline?`<p class="muted small">${esc(p.tagline)}</p>`:""}<div class="price-row"><span class="price">${money(p.price)}</span>${p.old_price?`<span class="old">${money(p.old_price)}</span>`:""}</div><button class="btn primary" data-add-simple="${esc(p.id)}">В корзину</button></div></article>`; }

    async function pageProduct(slug){
      const c = await loadCatalog();
      const p = c.products.find(x => x.slug === slug);
      if (!p) return shell(`<p>Товар не найден. <a class="link" href="#/">На главную</a></p>`);
      const variant = (p.variants || [])[state.variantIdx] || null;
      const color = (p.colors || [])[state.colorIdx] || null;
      const finalPrice = Number(p.price || 0) + Number(variant?.price_delta || 0);
      const images = p.image ? [{url:p.image, alt:p.name}, ...(p.images||[])] : (p.images||[]);

colorText'}])}${rowEditor('variants','Варианты',p.variants||[],[{k:'name',ph:'256 ГБ'},{k:'price_delta',ph:'+₽',type:'number'}])}${rowEditor('specs','Характеристики',p.specs||[],[{k:'key',ph:'Параметр'},{k:'value',ph:'Значение'}])}${rowEditor('images','Дополнительные фото',p.images||[],[{k:'url',ph:'URL фото'},{k:'alt',ph:'alt'}])}<div class="sticky-actions"><button class="btn primary" data-save-product>💾 Сохранить</button><button class="btn" data-cancel-edit>Отмена</button></div></div>`;
    }
    const SPEC_TEMPLATE = ["Артикул","Страна производства","Срок службы товара","Гарантийный срок","Модель","Размеры","Вес (грамм)","Материал задней панели","Поддержка MagSafe","Год релиза","Операционная система","Количество SIM-карт","Режим работы нескольких SIM-карт","Цвет","Конструкция","Материал корпуса","Класс водонепроницаемости","Устойчивое к царапинам стекло","Процессор","Объем встроенной памяти","Стандарт сотовой связи","Поддержка диапазонов 5G","Поддержка диапазонов LTE","Поддержка Wi-Fi","Поддержка Bluetooth","Возможности Bluetooth","Спутниковая навигация","Система A-GPS","Тип экрана","Соотношение сторон","Разрешение экрана","Частота обновления экрана","Число пикселей на дюйм (PPI)","Максимальная яркость экрана","Автоматический поворот экрана","Разъем для наушников","LiDAR","Количество основных (тыловых) камер","Основная камера","Функции основной (тыловой) фотокамеры","Сверхширокоугольная камера","Функции сверхширокоугольной камеры","Телефото-камера","Функции телефото-камеры","Фотовспышка","Запись видеороликов","Макс. разрешение видео","HDR","Макс. частота кадров видео при максимальном разрешении","Макс. частота кадров видео","Фронтальная камера","Беспроводная зарядка","Реверсивная зарядка","Тип разъема для зарядки","Быстрая зарядка","Тип разблокировки","Громкая связь (встроенный динамик)","Режим полета","Датчики","Комплектация"];
    function rowEditor(key,title,items,fields){
      const tplBtn = key==='specs' ? `<button class="btn" data-specs-template style="margin-left:6px">📋 Добавить шаблон (${SPEC_TEMPLATE.length} полей)</button><datalist id="spec-keys-list">${SPEC_TEMPLATE.map(k=>`<option value="${esc(k)}"></option>`).join('')}</datalist>` : '';

    function editRow(key,item,i,fields){ return `<div class="edit-row" data-row="${i}">${fields.map(f=>{ const listAttr = (key==='specs' && f.k==='key') ? ' list="spec-keys-list"' : ''; return f.type==='colorText'?`<input type="color" class="input" style="width:58px;padding:4px" data-row-field="${f.k}" value="${esc(item[f.k] || '#cccccc')}"><input class="input" style="max-width:130px" data-row-field="${f.k}" value="${esc(item[f.k] || '')}" placeholder="${f.ph}">`:`<input class="input"${listAttr} ${f.type==='number'?'type="number"':''} data-row-field="${f.k}" value="${esc(item[f.k] ?? '')}" placeholder="${f.ph}">`; }).join("")}<button class="btn icon danger" data-del-row="${key}:${i}">🗑</button></div>`; }

    async function pageCategory(slug){
      const c = await loadCatalog();
      const cat = c.categories.find(x => x.slug === slug);
      if (!cat) return shell(`<h1 class="page-title">Категория не найдена</h1><p class="empty"><a class="link" href="#/">На главную</a></p>`);
      const q = state.query.trim().toLowerCase();
      const allProducts = c.products.filter(p => p.category_id === cat.id);
      const meta = categoryFilters(slug, allProducts);
      const activeSpecs = Object.entries(state.specs).filter(([,vals]) => vals.length);
      const products = [...allProducts]
        .filter(p => !q || `${p.name} ${p.tagline||""} ${p.description||""} ${p.aliases||""}`.toLowerCase().includes(q))
        .filter(p => !state.onlyStock || p.in_stock)
        .filter(p => !state.onlySale || (p.old_price && p.old_price > p.price))
        .filter(p => !state.priceMin || Number(p.price) >= Number(state.priceMin))
        .filter(p => !state.priceMax || Number(p.price) <= Number(state.priceMax))
        .filter(p => !state.colors.length || (p.colors || []).some(color => state.colors.includes(color.name)))
        .filter(p => activeSpecs.every(([key, vals]) => (p.specs || []).some(s => s.key === key && vals.includes(s.value))));
      products.sort((a,b)=> state.sort === 'price-asc' ? a.price-b.price : state.sort === 'price-desc' ? b.price-a.price : state.sort === 'name' ? a.name.localeCompare(b.name,'ru') : (a.sort_order||0)-(b.sort_order||0));
      const otherCats = c.categories.filter(x=>x.id!==cat.id).sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));
      const hero = `<section class="hero"><div class="container hero-inner"><p class="muted" style="margin:0 0 8px"><a class="link" href="#/" style="padding:0">← Все категории</a></p><h1>${esc(cat.name)}</h1><p>Товары категории «${esc(cat.name)}» в ATH STORE.</p></div></section>`;
      const hasActive = q || state.onlyStock || state.onlySale || state.priceMin || state.priceMax || state.colors.length || activeSpecs.length || state.sort !== 'popular';
      const activeBadge = (state.colors.length + activeSpecs.length) || '';
      const filters = `<aside class="filter-panel${state.filtersOpen?' open':''}"><div class="filter-head"><h2>Фильтры</h2>${hasActive?`<button class="link small" data-reset-filters>Сбросить</button>`:''}</div><div class="filter-group"><label class="filter-title" for="search">Поиск</label><input id="search" class="input" type="search" placeholder="Название…" value="${esc(state.query)}"></div><div class="filter-group"><label class="filter-title" for="sort">Сортировка</label><select id="sort" class="input"><option value="popular" ${state.sort==='popular'?'selected':''}>По популярности</option><option value="price-asc" ${state.sort==='price-asc'?'selected':''}>Цена: сначала дешевле</option><option value="price-desc" ${state.sort==='price-desc'?'selected':''}>Цена: сначала дороже</option><option value="name" ${state.sort==='name'?'selected':''}>По названию</option></select></div><div class="filter-group"><div class="filter-title">Цена, ₽ <span class="muted small">${money(meta.min)} – ${money(meta.max)}</span></div><div class="filter-row"><input class="input" style="min-width:0" type="number" id="price-min" placeholder="от" value="${esc(state.priceMin)}"><input class="input" style="min-width:0" type="number" id="price-max" placeholder="до" value="${esc(state.priceMax)}"></div></div><div class="filter-group"><label class="filter-check"><input type="checkbox" id="only-stock" ${state.onlyStock?'checked':''}> Только в наличии</label><label class="filter-check"><input type="checkbox" id="only-sale" ${state.onlySale?'checked':''}> Со скидкой</label></div>${meta.colors.length?`<div class="filter-group"><div class="filter-title">Цвет</div><div class="chips">${meta.colors.map(color=>`<button class="filter-swatch ${state.colors.includes(color.name)?'active':''}" style="background:${esc(color.hex)}" title="${esc(color.name)}" aria-label="${esc(color.name)}" data-filter-color="${esc(color.name)}"></button>`).join('')}</div></div>`:''}${meta.keys.map(key=>{ const vals=filterValues(allProducts,key); if(vals.length < 1) return ''; return `<div class="filter-group"><div class="filter-title">${esc(key)}</div><div class="chips">${vals.map(v=>`<button class="filter-chip ${isSpecActive(key,v)?'active':''}" data-filter-spec-key="${esc(key)}" data-filter-spec-value="${esc(v)}">${esc(v)}</button>`).join('')}</div></div>`; }).join('')}<div class="filter-apply"><button class="btn primary" style="width:100%" data-filters-toggle>Показать ${products.length}</button></div></aside>`;
      const mobileBtn = `<button class="btn filter-toggle" data-filters-toggle>☰ Фильтры${activeBadge?` · ${activeBadge}`:''}</button>`;
      const backdrop = `<div class="filter-backdrop${state.filtersOpen?' open':''}" data-filters-toggle></div>`;
      return shell(`${mobileBtn}<div class="category-layout">${filters}${backdrop}<section><div class="category-top"><div class="category-count">${products.length} ${products.length===1?'товар':products.length>1&&products.length<5?'товара':'товаров'}</div><div class="chips">${otherCats.slice(0,6).map(o=>`<a class="chip" href="#/category/${esc(o.slug)}">${esc(o.name)}</a>`).join("")}</div></div>${products.length ? `<div class="grid">${products.map(productCard).join("")}</div>` : `<div class="summary"><p class="empty">Ничего не найдено по выбранным фильтрам.</p>${hasActive?`<button class="btn primary" data-reset-filters>Сбросить фильтры</button>`:''}</div>`}</section></div>`, hero);
    }

        <div class="summary" style="${cardStyle}"><h2 style="margin:0 0 10px;font-size:20px">💬 Связь</h2><div style="display:flex;flex-direction:column;gap:10px;margin-top:auto"><a class="btn primary" style="width:100%;box-sizing:border-box" href="https://t.me/${esc(TELEGRAM_USERNAME)}" target="_blank" rel="noopener">Написать в Telegram</a><a class="btn" style="width:100%;box-sizing:border-box" href="tel:${esc(SHOP_PHONE_TEL)}">Позвонить</a></div></div>
      </div>
      <div style="margin-top:28px;border:1px solid var(--border);border-radius:12px;overflow:hidden;max-width:920px"><iframe src="https://yandex.ru/map-widget/v1/?text=${encodeURIComponent('Горбушкин двор Москва')}" width="100%" height="380" frameborder="0" style="display:block;border:0" loading="lazy"></iframe></div>`;
      return shell(content, hero);
    }

    function notFound(){ return shell(`<h1 class="page-title">404</h1><p class="empty">Страница не найдена. <a class="link" href="#/">На главную</a></p>`); }

    async function render(){
      const r = route();
      try {
        state.variantIdx = r.startsWith('/product/') ? state.variantIdx : 0;
        state.colorIdx = r.startsWith('/product/') ? state.colorIdx : 0;
        if (r === '/') app.innerHTML = await pageHome();
        else if (r.startsWith('/category/')) app.innerHTML = await pageCategory(decodeURIComponent(r.split('/category/')[1] || ''));
        else if (r.startsWith('/product/')) app.innerHTML = await pageProduct(decodeURIComponent(r.split('/product/')[1] || ''));
        else if (r === '/contacts') app.innerHTML = pageContacts();
        else if (r === '/cart') app.innerHTML = pageCart();
        else if (r === '/checkout') app.innerHTML = pageCheckout();
        else if (r === '/login') app.innerHTML = pageLogin();
        else if (r === '/admin') app.innerHTML = await pageAdmin();
        else app.innerHTML = notFound();
      } catch (e) { app.innerHTML = shell(`<p class="empty">${esc(e.message || 'Ошибка загрузки')}</p>`); }
    }
    function renderHeaderOnly(){ render(); }

    document.addEventListener('click', async (e) => {
      const t = e.target.closest('button,a,label'); if (!t) return;
      if (t.dataset.action === 'logout') { localStorage.removeItem(STORAGE_ADMIN); toast('Вы вышли'); go('/'); render(); }
      if (t.dataset.cat) { state.activeCat = t.dataset.cat; render(); }
      if (t.dataset.resetFilters !== undefined) { state.query=''; state.sort='popular'; state.onlyStock=false; state.onlySale=false; state.priceMin=''; state.priceMax=''; state.colors=[]; state.specs={}; render(); }
      if (t.dataset.filtersToggle !== undefined) { state.filtersOpen = !state.filtersOpen; render(); }
      if (t.dataset.filterColor) { state.colors = state.colors.includes(t.dataset.filterColor) ? state.colors.filter(x=>x!==t.dataset.filterColor) : [...state.colors, t.dataset.filterColor]; render(); }
      if (t.dataset.filterSpecKey) { const key=t.dataset.filterSpecKey; const value=t.dataset.filterSpecValue; const cur=state.specs[key] || []; const next=cur.includes(value) ? cur.filter(x=>x!==value) : [...cur,value]; state.specs = {...state.specs}; if (next.length) state.specs[key]=next; else delete state.specs[key]; render(); }
      if (t.dataset.addSimple) { const c = await loadCatalog(); const p = c.products.find(x=>x.id===t.dataset.addSimple); if (p) addCart({id:p.id,name:p.name,price:p.price,image:p.image}); }
      if (t.dataset.variant) { state.variantIdx = Number(t.dataset.variant); render(); }
      if (t.dataset.color) { state.colorIdx = Number(t.dataset.color); render(); }
      if (t.dataset.addDetailed) { const c = await loadCatalog(); const p = c.products.find(x=>x.id===t.dataset.addDetailed); if (p) { const v=(p.variants||[])[state.variantIdx]; const col=(p.colors||[])[state.colorIdx]; addCart({id:`${p.id}|${state.variantIdx}|${state.colorIdx}`,name:`${p.name}${v?`, ${v.name}`:''}${col?`, ${col.name}`:''}`,price:Number(p.price)+Number(v?.price_delta||0),image:p.image}); } }
      if (t.dataset.qtyMinus) { const i=state.cart.find(x=>x.id===t.dataset.qtyMinus); if (i) setQty(i.id,i.qty-1); }
      if (t.dataset.qtyPlus) { const i=state.cart.find(x=>x.id===t.dataset.qtyPlus); if (i) setQty(i.id,i.qty+1); }
      if (t.dataset.remove) removeCart(t.dataset.remove);
      if (t.dataset.download) { const c=await loadCatalog(); downloadCatalogJson(c); }
      if (t.dataset.reset) { if (confirm('Сбросить локальные изменения и загрузить products.json с сайта?')) { await resetCatalog(); toast('Сброшено'); } }
      if (t.dataset.adminTab) { state.adminTab = t.dataset.adminTab; state.editingProduct=null; state.editingCategory=null; render(); }
      if (t.dataset.editProduct) { window.__editingProduct = null; state.editingProduct = t.dataset.editProduct; render(); }
      if (t.dataset.deleteProduct) { if (confirm('Удалить товар?')) { const c=await loadCatalog(); saveCatalog({...c, products:c.products.filter(p=>p.id!==t.dataset.deleteProduct)}); toast('Удалено'); } }
      if (t.dataset.cancelEdit !== undefined) { window.__editingProduct=null; state.editingProduct=null; render(); }
      if (t.dataset.addRow) { const p=collectProduct(); p[t.dataset.addRow].push(blankRow(t.dataset.addRow)); window.__editingProduct=p; app.innerHTML = await pageAdmin(); }
      if (t.dataset.delRow) { const [key, idx] = t.dataset.delRow.split(':'); const p=collectProduct(); p[key].splice(Number(idx),1); window.__editingProduct=p; app.innerHTML = await pageAdmin(); }
      if (t.dataset.specsTemplate !== undefined) { const p=collectProduct(); const existing=new Set((p.specs||[]).map(s=>s.key)); SPEC_TEMPLATE.forEach(k=>{ if(!existing.has(k)) p.specs.push({key:k, value:''}); }); window.__editingProduct=p; app.innerHTML = await pageAdmin(); toast('Шаблон добавлен'); }
      if (t.dataset.saveProduct !== undefined) { const p=collectProduct(); if (!p.name || !p.slug) return toast('Имя и slug обязательны'); const c=await loadCatalog(); const exists=c.products.some(x=>x.id===p.id); saveCatalog({...c, products: exists ? c.products.map(x=>x.id===p.id?p:x) : [...c.products,p]}); window.__editingProduct=null; state.editingProduct=null; toast('Сохранено'); render(); }
      if (t.dataset.newCategory !== undefined) { const c=await loadCatalog(); state.editingCategory = {id:uid(), name:'', slug:'', sort_order:c.categories.length+1}; render(); }
      if (t.dataset.editCategory) { const c=await loadCatalog(); state.editingCategory = structuredClone(c.categories.find(x=>x.id===t.dataset.editCategory)); render(); }
      if (t.dataset.deleteCategory) { if (confirm('Удалить категорию? Товары останутся без категории.')) { const c=await loadCatalog(); saveCatalog({...c, categories:c.categories.filter(x=>x.id!==t.dataset.deleteCategory), products:c.products.map(p=>p.category_id===t.dataset.deleteCategory?{...p,category_id:null}:p)}); toast('Удалено'); } }
      if (t.dataset.closeCategory !== undefined || t.dataset.modalBack !== undefined) { state.editingCategory=null; render(); }
      if (t.dataset.saveCategory !== undefined) { const cat=collectCategory(); if (!cat.name || !cat.slug) return toast('Заполните имя и slug'); const c=await loadCatalog(); const exists=c.categories.some(x=>x.id===cat.id); saveCatalog({...c, categories:(exists?c.categories.map(x=>x.id===cat.id?cat:x):[...c.categories,cat]).sort((a,b)=>a.sort_order-b.sort_order)}); state.editingCategory=null; toast('Сохранено'); render(); }
    });

    document.addEventListener('input', (e) => {
      const t=e.target;
      if (t.id === 'search') { state.query = t.value; render(); }
      if (t.id === 'sort') { state.sort = t.value; render(); }
      if (t.id === 'price-min') { state.priceMin = t.value; render(); }
      if (t.id === 'price-max') { state.priceMax = t.value; render(); }
      if (t.id === 'only-stock') { state.onlyStock = t.checked; render(); }
      if (t.id === 'only-sale') { state.onlySale = t.checked; render(); }
      if (t.name && t.closest('#checkout-form')) { state.checkout[t.name] = t.value; if (t.name === 'payment' && t.value === 'cash') state.checkout.delivery = 'pickup'; if (t.name === 'delivery' || t.name === 'payment') render(); }
      if (t.dataset && t.dataset.p) { if (!window.__editingProduct) return; const k=t.dataset.p; window.__editingProduct[k] = t.type==='checkbox' ? t.checked : (t.type==='number' ? (t.value===''?null:Number(t.value)) : (k==='category_id' ? (t.value||null) : t.value)); }
      if (t.dataset && t.dataset.rowField) { const row=t.closest('[data-row]'); const list=t.closest('[data-list]'); if (row && list && window.__editingProduct) { const key=list.dataset.list; const idx=Number(row.dataset.row); const field=t.dataset.rowField; window.__editingProduct[key][idx][field] = t.type==='number' ? Number(t.value) : t.value; const siblings = row.querySelectorAll(`[data-row-field="${field}"]`); siblings.forEach(s => { if (s !== t && s.type !== t.type) s.value = t.value; }); } }
      if (t.dataset && t.dataset.catField && state.editingCategory) { const k=t.dataset.catField; state.editingCategory[k] = t.type==='number' ? Number(t.value) : t.value; }
    });

    document.addEventListener('change', async (e) => {
      const t=e.target;
      if (t.id === 'sort') { state.sort = t.value; render(); }
      if (t.id === 'json-import' && t.files && t.files[0]) { try { const parsed=JSON.parse(await t.files[0].text()); if (!parsed.categories || !parsed.products) throw new Error('Неверная структура'); saveCatalog(parsed); toast('Загружено'); } catch(err){ toast(err.message || 'Ошибка JSON'); } t.value=''; }
    });

    document.addEventListener('submit', (e) => {
      if (e.target.id === 'login-form') { e.preventDefault(); const fd=new FormData(e.target); if (fd.get('login')===ADMIN_LOGIN && fd.get('password')===ADMIN_PASSWORD) { localStorage.setItem(STORAGE_ADMIN,'1'); toast('Вход выполнен'); go('/admin'); } else toast('Неверный логин или пароль'); }
      if (e.target.id === 'checkout-form') {
        e.preventDefault();
        if (!state.cart.length) return toast('Корзина пуста');
        if (state.checkout.name.trim().length<2) return toast('Укажите имя');
        if (state.checkout.phone.trim().length<5) return toast('Укажите телефон');
        const lines=state.cart.map(i=>`• ${i.name} × ${i.qty} — ${money(i.price*i.qty)}`).join('\n');
        const paymentLabel = state.checkout.payment==='card' ? 'Оплата картой' : (state.checkout.payment==='cash' ? 'Наличные' : state.checkout.payment);
        const deliveryLabel = state.checkout.delivery==='pickup' ? 'Самовывоз' : (state.checkout.delivery==='courier' ? 'Курьер' : 'Почта');
        const msg=`Новый заказ ATH STORE\n\n${lines}\n\nИтого: ${money(cartTotal())}\nИмя: ${state.checkout.name}\nТел: ${state.checkout.phone}\nДоставка: ${deliveryLabel}\nОплата: ${paymentLabel}${state.checkout.address?`\nАдрес: ${state.checkout.address}`:''}${state.checkout.notes?`\nКомментарий: ${state.checkout.notes}`:''}`;
        toast('Заказ оформлен! Мы свяжемся с вами в ближайшее время.');
        clearCart();
        go('/');
      }
    });

    function collectProduct(){
      const p = structuredClone(window.__editingProduct || blankProduct(1));
      document.querySelectorAll('[data-p]').forEach(t => { const k=t.dataset.p; p[k] = t.type==='checkbox' ? t.checked : (t.type==='number' ? (t.value===''?null:Number(t.value)) : (k==='category_id' ? (t.value||null) : t.value)); });
      document.querySelectorAll('[data-list]').forEach(list => { const key=list.dataset.list; p[key] = [...list.querySelectorAll('[data-row]')].map(row => { const obj={}; row.querySelectorAll('[data-row-field]').forEach(inp => { obj[inp.dataset.rowField] = inp.type==='number' ? Number(inp.value) : inp.value; }); return obj; }); });
      return p;
    }
    function collectCategory(){ document.querySelectorAll('[data-cat-field]').forEach(t => { state.editingCategory[t.dataset.catField] = t.type==='number' ? Number(t.value) : t.value; }); return state.editingCategory; }

    window.addEventListener('hashchange', render);
    if (!location.hash) location.hash = '#/';
    render();

    // Cookie banner
    if (!localStorage.getItem('cookieConsent')) {
      const b = document.createElement('div');
      b.style.cssText = 'position:fixed;left:16px;right:16px;bottom:16px;z-index:90;max-width:560px;margin:0 auto;background:#202124;color:#fff;border-radius:12px;padding:16px 18px;box-shadow:0 18px 50px rgba(0,0,0,.3);display:flex;gap:14px;align-items:center;flex-wrap:wrap;font-size:14px';
      b.innerHTML = '<span style="flex:1;min-width:200px">Этот сайт использует cookie для сбора информации и улучшения работы.</span><button style="background:#3b8b33;color:#fff;border:0;border-radius:8px;padding:9px 16px;font-weight:600;cursor:pointer">Принять</button>';
      b.querySelector('button').onclick = () => { localStorage.setItem('cookieConsent','1'); b.remove(); };
      document.body.appendChild(b);
    }
  })();
  </script>
</body>
</html>
